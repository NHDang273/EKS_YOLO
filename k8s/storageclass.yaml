kind: StorageClass
apiVersion: storage.k8s.io/v1
metadata:
  name: efs-sc
provisioner: efs.csi.aws.com
parameters:
  provisioningMode: efs-ap
  # Replace fs-XXXXXXXXX with your EFS file system ID
  fileSystemId: fs-XXXXXXXXX
  directoryPerms: "777"
  gidRangeStart: "1000"
  gidRangeEnd: "2000"
  basePath: "/yolo"
mountOptions:
  - tls
