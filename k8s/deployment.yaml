apiVersion: apps/v1
kind: Deployment
metadata:
  name: yolo-inference
  namespace: yolo-inference
  labels:
    app: yolo-inference
spec:
  replicas: ${DEPLOYMENT_REPLICAS}
  selector:
    matchLabels:
      app: yolo-inference
  template:
    metadata:
      labels:
        app: yolo-inference
    spec:
      serviceAccountName: yolo-sa

      # Init container to download model from S3 to EFS
      initContainers:
      - name: model-downloader
        image: amazon/aws-cli:latest
        command:
        - /bin/sh
        - -c
        - |
          set -e  # Exit on any error
          echo "Checking for model in EFS..."

          if [ ! -f /models/best.pt ]; then
            echo "Model not found. Downloading from S3..."
            if aws s3 cp s3://${S3_BUCKET}/${S3_MODEL_KEY} /models/best.pt; then
              echo "✓ Model downloaded successfully"
            else
              echo "✗ Failed to download model from S3"
              exit 1
            fi
          else
            echo "Model exists in EFS. Skipping download."
          fi

          # Verify file exists and is not empty
          if [ ! -f /models/best.pt ]; then
            echo "✗ Error: /models/best.pt does not exist"
            exit 1
          fi

          FILE_SIZE=$(stat -f%z /models/best.pt 2>/dev/null || stat -c%s /models/best.pt 2>/dev/null)
          if [ "$FILE_SIZE" -eq "0" ]; then
            echo "✗ Error: /models/best.pt is empty"
            exit 1
          fi

          echo "✓ Model file verified: ${FILE_SIZE} bytes"

          # Set proper permissions
          chmod 644 /models/best.pt
          echo "✓ Model is ready at /models/best.pt"
        volumeMounts:
        - name: models
          mountPath: /models
        env:
        - name: S3_BUCKET
          valueFrom:
            configMapKeyRef:
              name: yolo-config
              key: S3_BUCKET
        - name: S3_MODEL_KEY
          valueFrom:
            configMapKeyRef:
              name: yolo-config
              key: S3_MODEL_KEY
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: yolo-config
              key: AWS_REGION

      containers:
      - name: yolo-inference
        image: ${ECR_URL}:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          protocol: TCP

        resources:
          limits:
            memory: "${MEMORY_LIMIT}"
            cpu: "${CPU_LIMIT}"
          requests:
            memory: "${MEMORY_REQUEST}"
            cpu: "${CPU_REQUEST}"

        volumeMounts:
        - name: models
          mountPath: /models
          readOnly: true  # Read-only for model weights
        - name: output
          mountPath: /output
          readOnly: false  # Read-write for shared output
        - name: tmp
          mountPath: /tmp

        env:
        - name: MODEL_PATH
          valueFrom:
            configMapKeyRef:
              name: yolo-config
              key: MODEL_PATH
        - name: OUTPUT_PATH
          valueFrom:
            configMapKeyRef:
              name: yolo-config
              key: OUTPUT_PATH
        - name: INFERENCE_DEVICE
          valueFrom:
            configMapKeyRef:
              name: yolo-config
              key: INFERENCE_DEVICE
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace

        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

        # Security context
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL

      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: efs-models-claim
      - name: output
        persistentVolumeClaim:
          claimName: efs-output-claim
      - name: tmp
        emptyDir: {}

      nodeSelector:
        node.kubernetes.io/instance-type: ${INFERENCE_NODE_INSTANCE_TYPE}

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - yolo-inference
              topologyKey: kubernetes.io/hostname
