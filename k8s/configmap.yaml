apiVersion: v1
kind: ConfigMap
metadata:
  name: yolo-config
  namespace: yolo-inference
data:
  # S3 bucket where models are stored
  S3_BUCKET: "yolo-models-bucket"
  S3_MODEL_KEY: "models/best.pt"

  # AWS Region
  AWS_REGION: "us-west-2"

  # Path to model file in EFS (mounted from S3)
  MODEL_PATH: "/models/best.pt"

  # Path to shared output directory in EFS
  OUTPUT_PATH: "/output"

  # CUDA settings
  CUDA_VISIBLE_DEVICES: "0"
