apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: ${CLUSTER_NAME}
  region: ${AWS_REGION}
  version: "1.28"

# IAM OIDC & Service Account
iam:
  withOIDC: true
  serviceAccounts:
  - metadata:
      name: yolo-sa
      namespace: yolo-inference
    attachPolicyARNs:
    - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess

# VPC Configuration
vpc:
  cidr: 10.0.0.0/16
  nat:
    gateway: Single
  clusterEndpoints:
    publicAccess: true
    privateAccess: true

# Managed Node Groups
managedNodeGroups:
  - name: inference-nodes
    instanceType: ${INFERENCE_NODE_INSTANCE_TYPE}
    desiredCapacity: ${INFERENCE_NODE_MIN_SIZE}
    minSize: ${INFERENCE_NODE_MIN_SIZE}
    maxSize: ${INFERENCE_NODE_MAX_SIZE}
    volumeSize: 100
    volumeType: gp3
    amiFamily: AmazonLinux2
    iam:
      withAddonPolicies:
        autoScaler: true
        ebs: true
        efs: true
        albIngress: true
        cloudWatch: true
    labels:
      role: inference-worker
      workload: yolo-inference
    tags:
      nodegroup-role: cpu-inference
      k8s.io/cluster-autoscaler/enabled: "true"
      k8s.io/cluster-autoscaler/${CLUSTER_NAME}: "owned"

  - name: cpu-nodes
    instanceType: ${SYSTEM_NODE_INSTANCE_TYPE}
    desiredCapacity: ${SYSTEM_NODE_MIN_SIZE}
    minSize: ${SYSTEM_NODE_MIN_SIZE}
    maxSize: ${SYSTEM_NODE_MAX_SIZE}
    volumeSize: 50
    volumeType: gp3
    amiFamily: AmazonLinux2
    iam:
      withAddonPolicies:
        autoScaler: true
        ebs: true
        efs: true
        cloudWatch: true
    labels:
      role: cpu-worker
      workload: system
    tags:
      nodegroup-role: system
      k8s.io/cluster-autoscaler/enabled: "true"
      k8s.io/cluster-autoscaler/${CLUSTER_NAME}: "owned"

# Addons
addons:
  - name: vpc-cni
    version: latest
  - name: coredns
    version: latest
  - name: kube-proxy
    version: latest
